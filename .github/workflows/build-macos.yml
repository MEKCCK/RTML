name: Build and Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev zip ruby ruby-dev rpm
          sudo gem install --no-document fpm

      - name: Build Linux binary
        run: cargo build --release

      - name: Prepare Linux packages
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path('Cargo.toml').read_text())
          print(data['package']['version'])
          PY
          )
          mkdir -p artifacts dist/linux-root/usr/bin dist/linux-root/usr/share/applications dist/linux-root/usr/share/icons/hicolor/256x256/apps dist/linux-root/usr/share/icons/hicolor/512x512/apps
          install -m 0755 target/release/rtml dist/linux-root/usr/bin/rtml
          install -m 0644 assets/rtml.desktop dist/linux-root/usr/share/applications/rtml.desktop
          install -m 0644 assets/icon.png dist/linux-root/usr/share/icons/hicolor/256x256/apps/rtml.png
          install -m 0644 assets/icon.png dist/linux-root/usr/share/icons/hicolor/512x512/apps/rtml.png
          tar -czf "artifacts/rtml-linux-x86_64-${VERSION}.tar.gz" -C dist/linux-root .
          fpm -s dir -t deb -n rtml -v "$VERSION" -a amd64 --license GPL-3.0 --description "RTML - Rust TUI Minecraft Launcher" -C dist/linux-root --prefix / usr/bin/rtml usr/share/applications/rtml.desktop usr/share/icons/hicolor/256x256/apps/rtml.png usr/share/icons/hicolor/512x512/apps/rtml.png
          mv "rtml_${VERSION}_amd64.deb" "artifacts/rtml_${VERSION}_amd64.deb"
          fpm -s dir -t rpm -n rtml -v "$VERSION" -a x86_64 --license GPL-3.0 --description "RTML - Rust TUI Minecraft Launcher" -C dist/linux-root --prefix / usr/bin/rtml usr/share/applications/rtml.desktop usr/share/icons/hicolor/256x256/apps/rtml.png usr/share/icons/hicolor/512x512/apps/rtml.png
          mv "rtml-${VERSION}-1.x86_64.rpm" "artifacts/rtml-${VERSION}-1.x86_64.rpm"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: artifacts/*

  build-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Arch build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel rust git pkgconf openssl wget python zstd fakeroot

      - name: Create non-root build user
        run: |
          useradd -m builduser
          WORKSPACE="${GITHUB_WORKSPACE:-$(pwd)}"
          chown -R builduser:builduser "$WORKSPACE"

      - name: Build Arch package
        run: |
          set -euo pipefail
          mkdir -p artifacts
          WORKSPACE="${GITHUB_WORKSPACE:-$(pwd)}"
          su builduser -c "cd \"$WORKSPACE\" && fakeroot makepkg --noconfirm -f -p scripts/PKGBUILD"
          find . -maxdepth 1 -name '*.pkg.tar.zst' -exec cp {} artifacts/ \;

      - name: Upload Arch artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arch-artifacts
          path: artifacts/*

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install mingw-w64
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 zip

      - name: Build Windows binary
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Package Windows archive
        run: |
          mkdir -p artifacts
          zip -j artifacts/rtml-windows-x86_64.zip target/x86_64-pc-windows-gnu/release/rtml.exe

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts/*

  build-macos:
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-bundle
        run: cargo install cargo-bundle

      - name: Remove untrusted Homebrew taps (aws/tap)
        run: |
          if brew tap | grep -q '^aws/tap$'; then
            brew untap aws/tap || true
          fi

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Generate .icns icon
        run: |
          mkdir -p RTML.iconset
          sips -z 16 16 assets/icon.png --out RTML.iconset/icon_16x16.png
          sips -z 32 32 assets/icon.png --out RTML.iconset/icon_16x16@2x.png
          sips -z 32 32 assets/icon.png --out RTML.iconset/icon_32x32.png
          sips -z 64 64 assets/icon.png --out RTML.iconset/icon_32x32@2x.png
          sips -z 128 128 assets/icon.png --out RTML.iconset/icon_128x128.png
          sips -z 256 256 assets/icon.png --out RTML.iconset/icon_128x128@2x.png
          sips -z 256 256 assets/icon.png --out RTML.iconset/icon_256x256.png
          sips -z 512 512 assets/icon.png --out RTML.iconset/icon_256x256@2x.png
          sips -z 512 512 assets/icon.png --out RTML.iconset/icon_512x512.png
          iconutil -c icns RTML.iconset -o RTML.icns

      - name: Build and bundle .app
        run: cargo bundle --release --target ${{ matrix.target }}

      - name: Verify .app exists
        run: |
          APP_PATH="target/${{ matrix.target }}/release/bundle/osx/RTML.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: .app bundle not found at $APP_PATH"
            ls -la target/${{ matrix.target }}/release/bundle/osx/ 2>/dev/null || echo "  (bundle/osx directory missing)"
            exit 1
          fi
          echo "RTML.app verified at $APP_PATH"

      - name: Create .dmg
        run: |
          create-dmg \
            --volname "RTML" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 80 \
            --app-drop-link 600 185 \
            "RTML-${{ matrix.target }}.dmg" \
            "target/${{ matrix.target }}/release/bundle/osx/RTML.app"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/rtml
            target/${{ matrix.target }}/release/bundle/osx/RTML.app
            RTML-${{ matrix.target }}.dmg

  publish-release:
    needs: [build-linux, build-arch, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: auto-${{ github.run_number }}
          name: RTML Build ${{ github.run_number }}
          body: |
            Automated release for RTML.

            Includes binaries and packages for Linux, Arch Linux, Windows, and macOS.
          files: |
            release-assets/*
