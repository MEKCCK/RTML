[paths]
# where instances are stored
instances_dir = "~/.local/share/RTML/instances"

# metadata, cache, whatever else ends up there
meta_dir = "~/.local/share/RTML/meta"

# optional java override (empty = uses JAVA_HOME)
java_path = ""

[defaults]
# default heap settings
memory_min = "512M"
memory_max = "2G"

[ui]
# image protocol for content icons and screenshots: halfblocks, quadrants, kitty, or iterm2
image_protocol = "kitty"
# error popup timing (in ms)
error_auto_dismiss_ms = 5000
error_slide_start_ms = 3500
error_fly_out_ms = 300

# don’t let this blow up endlessly
max_error_events = 50
